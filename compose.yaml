services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: manageuser_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD:-am@700511}
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "sqlcmd -S localhost -U sa -P ${SA_PASSWORD:-am@700511} -Q 'SELECT 1' -C || /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${SA_PASSWORD:-am@700511} -Q 'SELECT 1' -C || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: manageuser_api
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Redis=redis:6379
    depends_on:
      - redis
      - sqlserver
    ports:
      - "5000:8080"

    restart: unless-stopped



volumes:
  sql_data:

